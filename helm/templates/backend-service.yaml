apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace | default "visionsupport" }}
  labels:
    app: visionsupport-backend
spec:
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.env.PORT }}
      protocol: TCP
      name: http
  selector:
    app: visionsupport-backend
  type: {{ .Values.backend.service.type }}
