apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ .Release.Namespace | default "visionsupport" }}
  labels:
    app: visionsupport-frontend
spec:
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: visionsupport-frontend
  type: {{ .Values.frontend.service.type }}
