apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: visionsupport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: visionsupport-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://visionsupport.local/api"
            - name: NEXT_PUBLIC_SOCKET_URL
              value: "http://visionsupport.local"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: visionsupport
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
