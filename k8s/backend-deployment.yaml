apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: visionsupport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: visionsupport-backend:latest
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              value: "mongodb://mongo:27017/visionsupport?replicaSet=rs0"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              value: "gAWUIHRQ$@&%*(RYIFH)"
            - name: FRONTEND_URL
              value: "http://visionsupport.local"
            - name: MEDIASOUP_MIN_PORT
              value: "10000"
            - name: MEDIASOUP_MAX_PORT
              value: "10100"
            - name: MEDIASOUP_LISTEN_IP
              value: "0.0.0.0"
            - name: MEDIASOUP_ANNOUNCED_IP
              value: "127.0.0.1" # In production, set to node IP or LoadBalancer IP
            - name: MINIO_ENDPOINT
              value: "minio"
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4318"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: visionsupport-secrets
                  key: gemini-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: visionsupport
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: backend
